  <!-- TOILETROLL PATHS LIBRARY
       A cute, chubby toilet-paper-roll mascot for metaflush.
       3/4-perspective puffy roll, two oval eyes on the left face,
       roll-end with spiral core hole on the right, water swirl/splash
       "flush" tail at the bottom-left with a twinkling 4-point star sparkle.
       Traced from the reference art (potrace), baked into the 1024x1024
       viewBox with no transforms. Outline line-work is FILLED (not stroked).
  -->

