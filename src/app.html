<!doctype html>
<html lang="en" data-theme="clean">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Icons (icon-192/512 + og-image generated once the mascot art is final) -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- Primary meta -->
    <title>metasplash — tag ya art</title>
    <meta name="author" content="Pablo" />
    <meta name="application-name" content="metasplash" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#fff7ed" />
    <link rel="canonical" href="https://metasplash.app/" />
    <meta
      name="description"
      content="Tag ya art. Stamp your name, copyright, socials, and credits onto your photos and audio before you share them — losslessly, 100% in your browser."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="metasplash" />
    <meta property="og:title" content="metasplash — tag ya art" />
    <meta
      property="og:description"
      content="Sign your work. Write your name, copyright & socials into photos (EXIF) and audio (ID3) before you ship them. Lossless, in your browser, nothing uploaded."
    />
    <meta property="og:url" content="https://metasplash.app/" />
    <meta property="og:image" content="https://metasplash.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="metasplash — tag ya art" />
    <meta
      name="twitter:description"
      content="Stamp your name, copyright & socials onto your photos and audio. Lossless, 100% in your browser."
    />
    <meta name="twitter:image" content="https://metasplash.app/og-image.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
